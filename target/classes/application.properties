quarkus.http.port=8080
quarkus.http.host=0.0.0.0

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:admin}
quarkus.datasource.password=${DB_PASSWORD:changeme}
quarkus.datasource.jdbc.url=${DB_JDBC_URL:jdbc:postgresql://localhost:5432/skillgateway}

quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration

quarkus.smallrye-health.root-path=/q/health

auth.api-key=${AUTH_API_KEY}

ai.embedding.url=${AI_EMBEDDING_URL:http://localhost:11434/api/embeddings}
ai.embedding.model=${AI_EMBEDDING_MODEL:nomic-embed-text}
ai.embedding.dimension=768

search.weight.keyword=0.3
search.weight.semantic=0.5
search.weight.popularity=0.2
search.default-limit=20
search.max-limit=50
