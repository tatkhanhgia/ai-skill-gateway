version: "3.9"

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.jvm
    container_name: skillgateway-server
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DB_JDBC_URL: jdbc:postgresql://db:5432/skillgateway
      DB_USERNAME: admin
      DB_PASSWORD: changeme
      AUTH_API_KEY: ${AUTH_API_KEY}

  db:
    image: pgvector/pgvector:pg16
    container_name: skillgateway-db
    environment:
      POSTGRES_DB: skillgateway
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - skillgateway_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d skillgateway"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: skillgateway-ollama
    ports:
      - "11434:11434"
    volumes:
      - skillgateway_ollama:/root/.ollama

volumes:
  skillgateway_pg_data:
  skillgateway_ollama:
