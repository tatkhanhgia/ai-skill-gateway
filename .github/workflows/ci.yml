name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: skillgateway
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U admin -d skillgateway"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Build
        run: mvn -B -DskipTests compile
      - name: Test
        env:
          DB_JDBC_URL: jdbc:postgresql://localhost:5432/skillgateway
          DB_USERNAME: admin
          DB_PASSWORD: testpass
          AUTH_API_KEY: ci-api-key
        run: mvn -B test
